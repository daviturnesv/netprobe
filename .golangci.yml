linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - bodyclose
    - misspell
    - unconvert
    - gocyclo
    - gosec
    - predeclared
    - noctx
    - nolintlint
    - dupl
    - goconst
    - gocritic
    - revive
  disable:
    - gocognit
    - lll
    - wsl

linters-settings:
  gocyclo:
    min-complexity: 15
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - dupImport
      - ifElseChain
      - rangeExprCopy
  revive:
    rules:
      - name: exported
        disabled: false
      - name: error-strings
        disabled: false
      - name: package-comments
        disabled: false
      - name: var-declaration
        disabled: false
      - name: early-return
        disabled: false
      - name: superfluous-else
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - gosec

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly